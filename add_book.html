<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Book | Library Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

    <div class="wrapper">
        <!-- Sidebar -->
        <nav id="sidebar">
            <div class="sidebar-header">
                <h4 class="mb-0 fw-bold text-white"><i class="fa-solid fa-book-open me-2 text-indigo"></i>Libraria</h4>
                <small class="text-muted">Management System</small>
            </div>
            <ul class="list-unstyled components">
                <li>
                    <a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                </li>
                <li>
                    <a href="manage_books.html"><i class="fa-solid fa-book"></i> Manage Books</a>
                </li>
                <li class="active">
                    <a href="add_book.html"><i class="fa-solid fa-circle-plus"></i> Add Book</a>
                </li>
                <li>
                    <a href="students.html"><i class="fa-solid fa-user-graduate"></i> Manage Students</a>
                </li>
                <li>
                    <a href="issue_book.html"><i class="fa-solid fa-arrow-up-from-bracket"></i> Issue Book</a>
                </li>
                <li>
                    <a href="return_book.html"><i class="fa-solid fa-arrow-down-long"></i> Return Book</a>
                </li>
                <li class="mt-5">
                    <a href="javascript:void(0)" onclick="Auth.logout()" class="text-danger"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                </li>
            </ul>
        </nav>

        <!-- Page Content -->
        <div id="content">
            <!-- Top Navbar -->
            <nav class="navbar navbar-expand-lg navbar-light">
                <div class="container-fluid">
                    <button type="button" id="sidebarCollapse" class="sidebar-toggle-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="d-flex align-items-center ms-auto">
                        <span class="navbar-text me-3 text-dark fw-medium">
                            <i class="fa-solid fa-user-circle me-1 text-indigo"></i> Welcome, <span id="admin-username-display">Admin</span>
                        </span>
                        <a href="javascript:void(0)" onclick="Auth.logout()" class="btn btn-outline-danger btn-sm">
                            <i class="fa-solid fa-power-off me-1"></i> Logout
                        </a>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <div class="container-fluid p-4">
                <!-- Flash Message Container -->
                <div id="flash-message-container"></div>

                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="dashboard.html" class="text-indigo text-decoration-none">Dashboard</a></li>
                        <li class="breadcrumb-item active" aria-current="page">Add Book</li>
                    </ol>
                </nav>

                <div class="row justify-content-center">
                    <div class="col-12 col-lg-8">
                        <div class="card form-card p-4">
                            <div class="border-bottom pb-3 mb-4 d-flex align-items-center justify-content-between">
                                <h3 class="h4 fw-bold text-dark mb-0"><i class="fa-solid fa-book-medical text-indigo me-2"></i>Add New Book</h3>
                                <a href="manage_books.html" class="btn btn-sm btn-outline-secondary">
                                    <i class="fa-solid fa-arrow-left me-1"></i> Back to List
                                </a>
                            </div>

                            <form>
                                <div class="row g-3">
                                    <!-- Book Title -->
                                    <div class="col-12">
                                        <label for="title" class="form-label fw-semibold small text-muted">Book Title</label>
                                        <input type="text" class="form-control" id="title" placeholder="e.g. Modern Operating Systems" required>
                                    </div>

                                    <!-- Book Author -->
                                    <div class="col-md-6">
                                        <label for="author" class="form-label fw-semibold small text-muted">Author Name</label>
                                        <input type="text" class="form-control" id="author" placeholder="e.g. Andrew S. Tanenbaum" required>
                                    </div>

                                    <!-- ISBN Number -->
                                    <div class="col-md-6">
                                        <label for="isbn" class="form-label fw-semibold small text-muted">ISBN (Unique code)</label>
                                        <input type="text" class="form-control" id="isbn" placeholder="e.g. 978-0133591620" required>
                                    </div>

                                    <!-- Category Selector -->
                                    <div class="col-md-6">
                                        <label for="category" class="form-label fw-semibold small text-muted">Category</label>
                                        <select class="form-select" id="category" required>
                                            <option value="" disabled selected>Choose a category...</option>
                                            <option value="Computer Science">Computer Science</option>
                                            <option value="Software Engineering">Software Engineering</option>
                                            <option value="Database Management">Database Management</option>
                                            <option value="Mathematics">Mathematics</option>
                                            <option value="Physics">Physics</option>
                                            <option value="Fiction">Fiction</option>
                                            <option value="General Science">General Science</option>
                                        </select>
                                    </div>

                                    <!-- Total Copies (Quantity) -->
                                    <div class="col-md-6">
                                        <label for="quantity" class="form-label fw-semibold small text-muted">Quantity (Copies)</label>
                                        <input type="number" class="form-control" id="quantity" min="1" value="1" required>
                                    </div>
                                </div>

                                <div class="mt-4 pt-3 border-top d-flex justify-content-end">
                                    <button type="reset" class="btn btn-outline-secondary me-2">
                                        <i class="fa-solid fa-arrows-rotate me-1"></i> Clear Form
                                    </button>
                                    <button type="submit" class="btn btn-indigo">
                                        <i class="fa-solid fa-save me-1"></i> Save Book Details
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="static/js/script.js"></script>
</body>
</html>
