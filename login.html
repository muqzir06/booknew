<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Library Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="login-body">

    <div class="login-card p-4">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-indigo text-white rounded-circle mb-3" style="width: 60px; height: 60px; background-color: #4f46e5;">
                <i class="fa-solid fa-lock-open fa-lg"></i>
            </div>
            <h3 class="fw-bold text-dark mb-1">Admin Portal</h3>
            <p class="text-muted">Sign in to manage library operations</p>
        </div>

        <!-- Flash Message Container -->
        <div id="flash-message-container"></div>

        <form id="loginForm">
            <!-- Username Input -->
            <div class="mb-3">
                <label for="username" class="form-label text-muted small fw-bold">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-user"></i></span>
                    <input type="text" class="form-control border-start-0" id="username" placeholder="e.g. admin" required>
                </div>
            </div>

            <!-- Password Input -->
            <div class="mb-4">
                <label for="password" class="form-label text-muted small fw-bold">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0 text-muted"><i class="fa-solid fa-key"></i></span>
                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-indigo w-100 py-2.5 fw-bold mb-3">
                <i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Login to Dashboard
            </button>

            <div class="text-center">
                <a href="index.html" class="text-indigo text-decoration-none small">
                    <i class="fa-solid fa-arrow-left me-1"></i> Back to Public Catalog
                </a>
            </div>
        </form>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="static/js/script.js"></script>
</body>
</html>
